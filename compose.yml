# JupyterLab: http://localhost:8888 (token printed to console on startup)
# RStudio Server: http://localhost:8787 — user: rstudio, password: q
# RStudio is also accessible as a tab inside JupyterLab via jupyter-rsession-proxy.
services:
  jupyter:
    build:
      dockerfile: Dockerfile
    ports:
      - '8888:8888'
      - '8787:8787'
    volumes:
      - ./:/home/rstudio
    working_dir: /home/rstudio
    container_name: agile_giscience_study
    environment:
      - PASSWORD=q
